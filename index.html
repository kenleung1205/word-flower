<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>字族開花 🌸</title>
  <meta name="description" content="拖曳部首積木，幫字族花開花！互動中文識字小遊戲。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌸</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1 id="app-title">🌸 字族開花</h1>
    <nav>
      <button id="nav-garden" class="nav-btn active">🌱 花園</button>
      <button id="nav-book" class="nav-btn">📖 圖鑑</button>
      <button id="nav-quiz" class="nav-btn">🎯 測驗</button>
      <button id="nav-add" class="nav-btn">➕ 加字</button>
    </nav>
  </header>

  <!-- 花園：選擇花（字族 / 部首 兩個模式） -->
  <main id="screen-garden" class="screen">
    <div class="mode-tabs">
      <button id="mode-family" class="mode-tab active">🌸 字族開花</button>
      <button id="mode-radical" class="mode-tab">🧩 部首開花</button>
    </div>
    <p class="hint" id="garden-hint">揀一朵花蕾，幫佢開花啦！</p>
    <div id="garden-grid" class="garden-grid"></div>
  </main>

  <!-- 遊戲：拖曳拼字 -->
  <main id="screen-game" class="screen hidden">
    <button id="btn-back" class="back-btn">← 返回花園</button>
    <div id="flower-area">
      <div id="flower">
        <div id="petals"></div>
        <div id="flower-center"><span id="base-char"></span></div>
        <div id="stem"></div>
      </div>
    </div>
    <p class="hint" id="game-hint">將部首積木拖去花心啦！</p>
    <div id="tray"></div>
  </main>

  <!-- 魔法圖鑑 -->
  <main id="screen-book" class="screen hidden">
    <p class="hint" id="book-hint"></p>
    <div id="book-grid" class="garden-grid"></div>

    <!-- 老師報告 -->
    <button id="btn-report-toggle" class="report-toggle">📊 老師報告</button>
    <div id="report-panel" class="report-panel hidden">
      <div id="report-content"></div>
      <button id="btn-reset-stats" class="danger-btn">🗑️ 清除測驗紀錄</button>
    </div>

    <button id="btn-reset" class="danger-btn">🔄 重設開花進度</button>
  </main>

  <!-- 測驗 -->
  <main id="screen-quiz" class="screen hidden">
    <div id="quiz-menu">
      <p class="hint">揀一種測驗，幫小朋友溫習！</p>
      <div class="quiz-pick">
        <button class="quiz-type-btn" data-type="word">🔊 聽詞揀字</button>
        <button class="quiz-type-btn" data-type="radical">🧩 部首配意思</button>
      </div>
    </div>
    <div id="quiz-play" class="hidden">
      <div id="quiz-progress"></div>
      <div id="quiz-question"></div>
      <div id="quiz-options"></div>
      <p class="hint" id="quiz-feedback"></p>
    </div>
    <div id="quiz-result" class="hidden">
      <div class="quiz-score" id="quiz-score"></div>
      <div class="quiz-result-btns">
        <button id="btn-quiz-again">🔁 再玩一次</button>
        <button id="btn-quiz-menu">↩︎ 揀第二種</button>
      </div>
    </div>
  </main>

  <!-- 自訂字族 -->
  <main id="screen-add" class="screen hidden">
    <p class="hint" id="add-hint">自己種一朵新嘅字族花！輸入花心字，再加花瓣（部首 + 新字）。</p>
    <div class="add-form">
      <label class="base-label"><span id="add-base-label">花心字</span>
        <input id="add-base" maxlength="2" placeholder="例：青" />
      </label>
      <div id="add-existing" class="add-existing hidden"></div>
      <div class="row-head">
        <span id="add-col-radical">部首</span><span>新字</span><span>詞語</span><span>emoji</span><span></span>
      </div>
      <div id="add-rows"></div>
      <div class="add-form-btns">
        <button id="btn-add-row">＋ 加多塊花瓣</button>
        <button id="btn-save-family">💾 儲存呢朵花</button>
      </div>
    </div>
  </main>

  <!-- 完成一朵花嘅慶祝層 -->
  <div id="celebrate" class="overlay hidden">
    <div class="celebrate-card">
      <div class="celebrate-emoji">🎉🌸🎉</div>
      <h2 id="celebrate-title"></h2>
      <p id="celebrate-words"></p>
      <div class="celebrate-btns">
        <button id="btn-review">🔍 回顧呢朵花</button>
        <button id="btn-next">下一朵花 ➜</button>
        <button id="btn-book">📖 睇圖鑑</button>
      </div>
    </div>
  </div>

  <!-- 回顧成朵花（唯讀，㩒個字睇例詞例句） -->
  <div id="review-modal" class="overlay hidden">
    <div class="review-card">
      <button id="review-close" class="ex-close" title="關閉">✕</button>
      <h2 id="review-title"></h2>
      <p class="review-sub">㩒一㩒每個字，聽讀音、睇例詞例句 🔊</p>
      <div id="review-list" class="review-list"></div>
      <button id="review-done" class="ex-save-btn">👍 睇完喇</button>
    </div>
  </div>

  <!-- 例詞 / 例句（㩒入個字睇，由老師自己加） -->
  <div id="examples-modal" class="overlay hidden">
    <div class="ex-card">
      <button id="ex-close" class="ex-close" title="關閉">✕</button>
      <div class="ex-char" id="ex-char"></div>
      <div class="ex-section">
        <h3>📚 例詞</h3>
        <div id="ex-words" class="ex-list"></div>
      </div>
      <div class="ex-section">
        <h3>✏️ 例句</h3>
        <div id="ex-sentences" class="ex-list"></div>
      </div>
      <button id="ex-edit" class="ex-edit-btn">✏️ 編輯例詞例句</button>
      <div id="ex-edit-area" class="hidden">
        <label class="ex-label">例詞（每行一個）
          <textarea id="ex-words-input" rows="3" placeholder="清水&#10;清潔"></textarea>
        </label>
        <label class="ex-label">例句（每行一句）
          <textarea id="ex-sentences-input" rows="3" placeholder="河水好清。"></textarea>
        </label>
        <button id="ex-save" class="ex-save-btn">💾 儲存</button>
      </div>
    </div>
  </div>

  <canvas id="fireworks"></canvas>

  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
